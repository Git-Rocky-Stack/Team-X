appId: com.strategia.team-x
productName: Team-X
copyright: Copyright (c) 2026 Rocky Elsalaymeh

directories:
  buildResources: build
  output: ../../release/${version}

# electron-vite outputs to out/; we include that plus runtime deps.
# Workspace packages (@team-x/*) are bundled by Vite — excluded here.
files:
  - out/**/*
  - "!out/**/*.map"
  - package.json
  - node_modules/**/*
  - "!node_modules/@team-x/**"
  - "!node_modules/.pnpm/**/node_modules/@team-x/**"
  - "!node_modules/**/{test,tests,__tests__,spec,specs}/**"
  - "!node_modules/**/*.{md,ts,map}"
  - "!node_modules/.package-lock.json"

extraMetadata:
  main: out/main/index.js

# Native modules must be outside the asar archive because Node.js
# cannot load .node binaries from within an asar.
asar: true
asarUnpack:
  - "node_modules/better-sqlite3/**"
  - "node_modules/keytar/**"
  # llama-server binaries must run directly from disk (not from inside asar).
  # electron-builder copies these via extraResources above; asarUnpack
  # ensures they land in app.asar.unpacked/ where Node child_process can exec them.
  - "resources/llama-server/**"

# Role packs ship alongside the asar as extraResources so users can
# edit/add packs without rebuilding. The files land in the app's
# resources/ directory at runtime (accessible via process.resourcesPath).
extraResources:
  - from: src/main/db/migrations
    to: migrations
    filter:
      - "**/*"
  - from: ../../role-packs
    to: role-packs
    filter:
      - "**/*"
      - "!**/.git"
  # llama.cpp runtime binaries (Option C: runtime-fetch, never committed).
  # Populated by scripts/fetch-llama-binaries.mjs during prepack.
  # Must be asarUnpack-ed: native server binaries cannot execute from within
  # an asar archive.
  - from: resources/llama-server
    to: llama-server
    filter:
      - "**/*"

# Rebuild native modules for the target Electron ABI.
npmRebuild: true
nodeGypRebuild: false
buildDependenciesFromSource: false

# ─── Windows ──────────────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch:
        - x64
        - arm64
  icon: build/icon.ico
  artifactName: Team-X-${version}-Setup-${arch}.${ext}

nsis:
  # The electron-builder multi-arch NSIS wrapper crashes on this Windows host
  # immediately after the assisted installer's first Next click. Ship the
  # architecture-specific installers directly instead.
  buildUniversalInstaller: false
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  deleteAppDataOnUninstall: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  installerIcon: build/installerIcon.ico
  uninstallerIcon: build/uninstallerIcon.ico
  installerSidebar: build/installerBanner.bmp
  license: build/license.html
  menuCategory: Strategia-X
  shortcutName: Team-X
  uninstallDisplayName: Team-X
  uninstallUrlHelp: https://github.com/Git-Rocky-Stack/
  uninstallUrlInfoAbout: https://github.com/Git-Rocky-Stack/
  uninstallUrlReadme: https://github.com/Git-Rocky-Stack/
  uninstallUrlUpdateInfo: https://github.com/Git-Rocky-Stack/
  runAfterFinish: false
  # Fix: System.dll plugin causes ACCESS_VIOLATION (0xc0000005) crash on Windows 11
  # Disabling the plugin prevents installer from crashing on startup
  useZip: false
  packElevateHelper: false

# ─── macOS ────────────────────────────────────────────────────────────
# `identity: null` explicitly disables code signing so the build path
# succeeds even when Mac signing secrets (CSC_LINK, CSC_KEY_PASSWORD,
# APPLE_ID, etc.) are not yet populated in repo Settings → Secrets.
# Without this, an empty CSC_LINK causes electron-builder to enter the
# signing path and try to read `apps/desktop` as a cert file, failing
# with `apps/desktop not a file`.
#
# Remove this line once Mac signing Phases 1-3 of
# `docs/handoffs/2026-05-10-mac-codesigning-plan.md` are complete and
# the five repo secrets exist. The signing env vars in `release.yml`
# will then take effect automatically.
mac:
  identity: null
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: build/icon.png
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  artifactName: Team-X-${version}-${arch}.${ext}

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# ─── Linux ────────────────────────────────────────────────────────────
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: build/icon-512.png
  category: Utility
  executableArgs:
    - --class=team-x
  artifactName: Team-X-${version}-${arch}.${ext}

# .deb-specific runtime dependencies. keytar (libsecret-1) is the
# Linux backing store for the OS keychain — without it, the first
# API-key access throws at runtime on minimal distros (Ubuntu Server,
# Debian netinst, container images) that don't preinstall it. Ubuntu
# Desktop and Fedora Workstation ship libsecret by default; declaring
# it here guarantees apt resolves it everywhere else.
#
# AppImage users still need libsecret-1-0 for the OS keychain. Note that
# AppImage bundles the app's own libraries but does NOT bundle FUSE: the
# AppImage *runtime* requires FUSE 2 (`libfuse.so.2`) on the host to
# self-mount. Modern Ubuntu (22.04+) no longer ships it by default, and
# 24.04 renamed the package to `libfuse2t64` — without it the AppImage
# fails to start before any app code runs (issue #4). Users either install
# `libfuse2` / `libfuse2t64` (Fedora: `fuse-libs`) or run the image with
# `--appimage-extract-and-run`. Documented in README / quick-start / FAQ,
# and release.yml smoke-tests the AppImage boot before publishing.
deb:
  depends:
    - libsecret-1-0
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
    - libatspi2.0-0

# ─── Publishing ───────────────────────────────────────────────────────
# Publish to GitHub Releases. The release workflow creates a draft
# release and electron-builder uploads artifacts to it.
# Set to "null" for local-only builds (pnpm dist).
publish:
  provider: github
  owner: Git-Rocky-Stack
  repo: Team-X
  releaseType: draft
