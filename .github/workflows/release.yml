name: Release

# Triggered by pushing a version tag (e.g. v1.0.0).
# Builds installers for Windows, macOS, and Linux, generates SHA256
# checksums, and uploads everything to a GitHub Release draft.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    steps:
      - uses: actions/checkout@v4

      # pnpm version is read from root package.json `packageManager`
      # field (single source of truth). Pinned to pnpm@9.15.9.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      # Linux: Electron runtime libraries for headless build + keytar's
      # libsecret backing store. `pnpm test` loads keytar via
      # provider-factory.test.ts and would fail to dlopen `libsecret-1.so.0`
      # without `libsecret-1-0` installed. Mirrors the ci.yml `check` job's
      # libsecret install — keep both in sync.
      - name: Install Electron runtime libraries (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2t64 \
            libgtk-3-0 \
            libsecret-1-0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build workspace packages' dist outputs before typecheck.
      # apps/desktop's tsconfig declares each package as a composite project
      # reference, so its `tsc --noEmit` step expects the referenced project's
      # `dist/index.d.ts` to exist on disk. Fresh CI checkouts have no dist
      # (gitignored), so materialize them explicitly. `tsc --build` resolves
      # the reference graph and builds in dep order automatically. Mirrors
      # the ci.yml `check` job's pre-build step — keep both in sync.
      - name: Build workspace packages (composite refs)
        run: pnpm exec tsc --build packages/shared-types packages/role-schema packages/provider-router packages/telemetry-core packages/intelligence packages/local-gguf-runtime

      # Lint / Typecheck / Test as three separate steps so failures surface
      # individually. A previous attempt combined them into a single
      # multi-line `run:` block, which works under `bash -e` on Linux/macOS
      # but NOT under pwsh on Windows — pwsh does not abort on the first
      # failing command in a multi-line script, so a failed typecheck was
      # silently followed by a (passing) `pnpm test`, and the step's exit
      # code reflected only the last command. Three steps make every
      # failure mode visible.
      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build + Package (${{ matrix.platform }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Mac signing + notarization — only effective on the macos-latest
          # leg (electron-builder ignores these on win/linux). All five are
          # optional: when any one is empty (secrets not yet configured),
          # electron-builder skips signing entirely and produces an unsigned
          # .dmg — matching the pre-2026-05 launch-readiness baseline. See
          # docs/handoffs/2026-05-10-mac-codesigning-plan.md for the four-
          # phase setup (Apple Developer enrollment → cert → secrets → this).
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm -F @team-x/desktop dist:${{ matrix.platform }}

      # Smoke-test the Linux AppImage before it can ship. electron-builder's
      # AppImage runtime requires FUSE 2 on the host to self-mount — a missing
      # libfuse2 (libfuse2t64 on Ubuntu 24.04) makes the AppImage fail to start
      # before any app code runs, while the .deb is unaffected (issue #4). This
      # job previously built the AppImage but never launched it, so a
      # non-starting build shipped undetected. We install FUSE 2, prove the
      # image self-mounts (the exact issue #4 path), then boot it headlessly
      # under Xvfb and assert it survives a short startup window.
      - name: Smoke-test AppImage (Linux)
        if: matrix.platform == 'linux'
        run: |
          set -uo pipefail
          sudo apt-get update
          sudo apt-get install -y xvfb
          # Ubuntu 24.04 ships FUSE 2 as libfuse2t64; older runners use libfuse2.
          sudo apt-get install -y libfuse2t64 || sudo apt-get install -y libfuse2

          APPIMAGE="$(ls release/*/Team-X-*-x64.AppImage 2>/dev/null | head -n1)"
          if [ -z "${APPIMAGE}" ]; then
            echo "::error::No AppImage found under release/*/ — packaging produced none."
            ls -R release/ 2>/dev/null || true
            exit 1
          fi
          chmod +x "${APPIMAGE}"
          echo "Smoke-testing: ${APPIMAGE}"

          # 1) Deterministic FUSE/runtime check: the image must self-mount.
          #    A broken FUSE path or corrupt squashfs exits non-zero here.
          "${APPIMAGE}" --appimage-mount >/tmp/aimount.log 2>&1 &
          MNT_PID=$!
          sleep 3
          if ! kill -0 "${MNT_PID}" 2>/dev/null; then
            wait "${MNT_PID}" || true
            echo "::error::AppImage failed to self-mount (FUSE/runtime broken)."
            cat /tmp/aimount.log 2>/dev/null || true
            exit 1
          fi
          MNT="$(head -n1 /tmp/aimount.log 2>/dev/null || true)"
          echo "Self-mounted OK at: ${MNT:-<unknown>}"
          if [ -n "${MNT}" ] && [ -e "${MNT}/AppRun" ]; then echo "AppRun present in mount."; fi
          kill "${MNT_PID}" 2>/dev/null || true
          wait "${MNT_PID}" 2>/dev/null || true

          # 2) Functional boot check: launch headless and require it to stay up.
          #    --no-sandbox is needed on CI runners (no SUID sandbox / restricted
          #    user namespaces); it affects only this boot check, not artifacts.
          xvfb-run -a "${APPIMAGE}" --no-sandbox >/tmp/aiboot.log 2>&1 &
          APP_PID=$!
          for i in $(seq 1 25); do
            if ! kill -0 "${APP_PID}" 2>/dev/null; then
              wait "${APP_PID}"; code=$?
              echo "::error::AppImage exited early (code ${code}) — failed to start."
              echo "----- boot log -----"; cat /tmp/aiboot.log 2>/dev/null || true
              exit 1
            fi
            sleep 1
          done
          echo "AppImage booted and stayed alive 25s — smoke test passed."
          kill "${APP_PID}" 2>/dev/null || true
          wait "${APP_PID}" 2>/dev/null || true

      # Upload installers + electron-updater manifests + diff-update block
      # maps. Whitelist by artifact-name pattern so the win-unpacked binary
      # (`win-unpacked/Team-X.exe`, ~181 MB) does NOT get bundled — the v3.2.0
      # ship used `release/**/*.exe` which dragged it in and surfaced as a
      # stray `Team-X.exe` asset on the release. See
      # docs/handoffs/2026-05-12-v3.2.0-release-shipped.md §4.3 for context.
      #
      # SHA256SUMS.txt is intentionally NOT generated here — it's produced
      # once in the publish job below, AFTER download-artifact merges all
      # three OS bundles. Per-OS generation in v3.2.0 was clobbered by
      # `merge-multiple: true`, which last-write-wins on same-named files.
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            release/**/Team-X-*-Setup-*.exe
            release/**/Team-X-*.dmg
            release/**/Team-X-*.AppImage
            release/**/Team-X-*.deb
            release/**/Team-X-*-Setup-*.exe.blockmap
            release/**/Team-X-*.dmg.blockmap
            release/**/latest*.yml
          retention-days: 7

  publish:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # Generate the SHA256SUMS manifest AFTER merge so it covers every
      # installer across all three OSes in one consolidated file. v3.2.0
      # generated this per-OS in each build job, but `merge-multiple: true`
      # then flattened the three bundles into one dir — last-write-wins on
      # `SHA256SUMS.txt` meant only one OS's hashes survived. Generating
      # here, post-merge, eliminates the collision structurally. See
      # docs/handoffs/2026-05-12-v3.2.0-release-shipped.md §4.3.
      - name: Generate consolidated SHA256SUMS.txt
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          # electron-builder writes to release/<version>/ on the build runner,
          # but upload-artifact@v4 strips the common path prefix (`release/`)
          # from every uploaded path. After merge-multiple, files land at
          # artifacts/<version>/, NOT artifacts/release/<version>/. Glob the
          # version dir so the version itself isn't hardcoded.
          dirs=(artifacts/*/)
          if [ ${#dirs[@]} -ne 1 ]; then
            echo "Expected exactly one version dir under artifacts/, found: ${dirs[*]}"
            ls -la artifacts/ || true
            exit 1
          fi
          cd "${dirs[0]}"

          rm -f SHA256SUMS.txt
          # Hash installers only — blockmaps and update manifests ship
          # alongside as separate assets but aren't covered by the
          # integrity manifest (electron-updater verifies them separately).
          for f in Team-X-*-Setup-*.exe Team-X-*.dmg Team-X-*.AppImage Team-X-*.deb; do
            if [ -f "$f" ]; then
              sha256sum "$f" >> SHA256SUMS.txt
            fi
          done

          sort -k 2 SHA256SUMS.txt -o SHA256SUMS.txt
          echo "--- SHA256SUMS.txt ---"
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          # Whitelist installer names — prevents stray `win-unpacked/Team-X.exe`
          # from appearing as an asset. `latest*.yml` + `*.blockmap` are now
          # uploaded for electron-updater auto-update and differential downloads.
          files: |
            artifacts/**/Team-X-*-Setup-*.exe
            artifacts/**/Team-X-*.dmg
            artifacts/**/Team-X-*.AppImage
            artifacts/**/Team-X-*.deb
            artifacts/**/*.blockmap
            artifacts/**/latest*.yml
            artifacts/**/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
