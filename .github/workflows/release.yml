name: Release

# Triggered by pushing a version tag (e.g. v1.0.0).
# Builds installers for Windows, macOS, and Linux, generates SHA256
# checksums, and uploads everything to a GitHub Release draft.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    steps:
      - uses: actions/checkout@v4

      # pnpm version is read from root package.json `packageManager`
      # field (single source of truth). Pinned to pnpm@9.15.9.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      # Linux: Electron runtime libraries for headless build + keytar's
      # libsecret backing store. `pnpm test` loads keytar via
      # provider-factory.test.ts and would fail to dlopen `libsecret-1.so.0`
      # without `libsecret-1-0` installed. Mirrors the ci.yml `check` job's
      # libsecret install — keep both in sync.
      - name: Install Electron runtime libraries (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2t64 \
            libgtk-3-0 \
            libsecret-1-0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build workspace packages' dist outputs before typecheck.
      # apps/desktop's tsconfig declares each package as a composite project
      # reference, so its `tsc --noEmit` step expects the referenced project's
      # `dist/index.d.ts` to exist on disk. Fresh CI checkouts have no dist
      # (gitignored), so materialize them explicitly. `tsc --build` resolves
      # the reference graph and builds in dep order automatically. Mirrors
      # the ci.yml `check` job's pre-build step — keep both in sync.
      - name: Build workspace packages (composite refs)
        run: pnpm exec tsc --build packages/shared-types packages/role-schema packages/provider-router packages/telemetry-core packages/intelligence

      # Lint / Typecheck / Test as three separate steps so failures surface
      # individually. A previous attempt combined them into a single
      # multi-line `run:` block, which works under `bash -e` on Linux/macOS
      # but NOT under pwsh on Windows — pwsh does not abort on the first
      # failing command in a multi-line script, so a failed typecheck was
      # silently followed by a (passing) `pnpm test`, and the step's exit
      # code reflected only the last command. Three steps make every
      # failure mode visible.
      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build + Package (${{ matrix.platform }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Mac signing + notarization — only effective on the macos-latest
          # leg (electron-builder ignores these on win/linux). All five are
          # optional: when any one is empty (secrets not yet configured),
          # electron-builder skips signing entirely and produces an unsigned
          # .dmg — matching the pre-2026-05 launch-readiness baseline. See
          # docs/handoffs/2026-05-10-mac-codesigning-plan.md for the four-
          # phase setup (Apple Developer enrollment → cert → secrets → this).
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm -F @team-x/desktop dist:${{ matrix.platform }}

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          cd release/*/
          for f in *.exe *.dmg *.AppImage *.deb *.blockmap *.yml 2>/dev/null; do
            [ -f "$f" ] && sha256sum "$f" >> SHA256SUMS.txt
          done
          cat SHA256SUMS.txt 2>/dev/null || echo "No artifacts found"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            release/**/*.exe
            release/**/*.dmg
            release/**/*.AppImage
            release/**/*.deb
            release/**/*.blockmap
            release/**/*.yml
            release/**/SHA256SUMS.txt
          retention-days: 7

  publish:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
